<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Agency</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class='thumb'>
        <header class="header">
            <div class="logo">
                <img src="./Assets/Logo.svg" alt="Proxylab Logo">
                <div class="logo-text">Proxylab</div>
            </div>
            <nav class="nav">
                <a href="#">Features</a>
                <a href="#">Pricing & Plans</a>
                <a href="#">Support</a>
                <a href="#">About Us</a>
                <div class="contact-us">
                    <a href="#">Contact Us</a>
                </div>
            </nav>
        </header>
        <main class="title">
            <div class="title-text">
                <span class="title-best-marketing">Best <span class="title-marketing">Marketing</span></span>
                <br>
                <span class="title-digital-agency">Digital Agency</span>
                <p>Various versions have evolved over the years,<br> sometimes by accident, sometimes on purpose</p>
            </div>
            <div class="title-decoration">
                <img src="./Assets/Shape.png" alt="Decoration">
            </div>
            <div class="happy-girl">
                <img src="./Assets/Happy girl.png" alt="Happy girl">
            </div>
        </main>
        <div class="main-button">
            <a class="get-started" href="#">Get Started</a>
            <img src="./Assets/icon.svg" alt="Video icon">
            <a href="#">Watch Video</a>
        </div>
    </div>
</body>

</html>
